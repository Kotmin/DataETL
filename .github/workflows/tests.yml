name: Tests

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install unixodbc-dev (required to compile pyodbc)
        run: sudo apt-get install -y unixodbc-dev

      - name: Create venv and install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Run unit and transform tests
        run: |
          mkdir -p reports
          .venv/bin/pytest tests/test_transform.py tests/test_transform_phase2.py \
            -v --html=reports/test-report.html --self-contained-html

      - name: Sync with remote (keep linear history)
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "${GITHUB_REF_NAME}"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true

      - name: Commit test report
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          git add reports/test-report.html
          git diff --staged --quiet || git commit -m "ci: update test report [skip ci]"

      - name: Push
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          git push --force-with-lease origin "${GITHUB_REF_NAME}"

      - name: Upload HTML test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: reports/test-report.html
