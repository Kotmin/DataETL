name: Tests

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install unixodbc-dev (required to compile pyodbc)
        run: sudo apt-get install -y unixodbc-dev

      - name: Create venv and install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Run unit and transform tests
        run: |
          mkdir -p reports
          .venv/bin/pytest tests/test_transform.py tests/test_transform_phase2.py \
            -v --html=reports/test-report.html --self-contained-html

      - name: Commit updated test report to repo
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/test-report.html
          git diff --staged --quiet || git commit -m "ci: update test report [skip ci]"
          git push

      - name: Upload HTML test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: reports/test-report.html
